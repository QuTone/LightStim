[pytest]
# Default: run smoke + integration, skip slow.
# CI command: pytest tests/ -m "not slow" --timeout=60 -q
# Full run:   pytest tests/ --timeout=300
addopts = -q --tb=short
markers =
    smoke:       fast, <60s total — run on every commit
    integration: <5min — run before merge (default if no marker)
    slow:        >5min — run manually or on release
